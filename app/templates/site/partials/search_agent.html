<!-- Semantic Search Agent -->

<!-- Floating Trigger Button -->
<button class="search-agent-trigger" id="search-agent-trigger" aria-label="Open AI Search">
    <i class="bi bi-stars"></i>
</button>

<!-- Modal Overlay -->
<div class="search-agent-overlay" id="search-agent-overlay">
    <!-- Modal -->
    <div class="search-agent-modal" id="search-agent-modal">
        <!-- Header -->
        <div class="search-agent-header">
            <div class="search-agent-title">
                <i class="bi bi-stars"></i>
                <h3>AI-Powered Search</h3>
            </div>
            <button class="search-agent-close" id="search-agent-close" aria-label="Close">
                <i class="bi bi-x-lg"></i>
            </button>

            <!-- Search Input -->
            <div class="search-agent-input-wrapper">
                <i class="bi bi-search"></i>
                <input
                    type="text"
                    class="search-agent-input"
                    id="search-agent-input"
                    placeholder="Ask me anything about the blog..."
                    data-search-url="{{ url_for('site_bp.site_semantic_search', site_identifier=settings.site_slug|default(user_id, true)) }}"
                    autocomplete="off"
                >
            </div>
        </div>

        <!-- Results Container -->
        <div class="search-agent-results">
            <!-- Initial State -->
            <div class="search-agent-initial" id="search-agent-initial">
                <i class="bi bi-lightbulb"></i>
                <h4>Semantic Search</h4>
                <p>Search using natural language. Try "articles about productivity" or "how to improve writing"</p>
            </div>

            <!-- Loading State -->
            <div class="search-agent-loading" id="search-agent-loading">
                <div class="search-agent-spinner"></div>
                <p>Searching...</p>
            </div>

            <!-- Empty State -->
            <div class="search-agent-empty" id="search-agent-empty">
                <i class="bi bi-search"></i>
                <h4>No results found</h4>
                <p>Try different keywords or a broader search term</p>
            </div>

            <!-- Results List -->
            <p class="search-results-count" id="search-results-count"></p>
            <div class="search-agent-list" id="search-agent-list">
                <!-- Results will be inserted here by JavaScript -->
            </div>
        </div>
    </div>
</div>
