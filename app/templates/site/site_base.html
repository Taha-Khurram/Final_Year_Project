<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ settings.site_name }}{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Site Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site/site.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Site Header -->
    <header class="site-header">
        <div class="header-container">
            <a href="{{ url_for('site_bp.site_home', user_id=user_id) }}" class="site-logo">
                <i class="bi bi-journal-richtext"></i>
                <span class="site-logo-text">{{ settings.site_name }}</span>
            </a>
            <nav class="site-nav">
                <a href="{{ url_for('site_bp.site_home', user_id=user_id) }}" class="{% if request.endpoint == 'site_bp.site_home' and not current_category %}active{% endif %}">Home</a>
                <a href="{{ url_for('site_bp.site_about', user_id=user_id) }}" class="{% if request.endpoint == 'site_bp.site_about' %}active{% endif %}">About</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-text">
                &copy; {{ settings.site_name }} {{ now().year if now else '2024' }}
            </div>
            <div class="footer-links">
                <a href="{{ url_for('site_bp.site_home', user_id=user_id) }}">Home</a>
                <a href="{{ url_for('site_bp.site_about', user_id=user_id) }}">About</a>
            </div>
            <div class="powered-by">
                <i class="bi bi-lightning-charge-fill" style="color: var(--primary-color);"></i>
                Powered by <a href="/">ScriptlyAI</a>
            </div>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
