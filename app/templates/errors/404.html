<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | {{ app_config.app_name if app_config else 'Scriptly' }}</title>

    <!-- Fonts - Plus Jakarta Sans (Dashboard Font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #4318FF;
            --primary-light: #7B5AFF;
            --bg-body: #F4F7FE;
            --bg-card: #ffffff;
            --text-primary: #2B3674;
            --text-secondary: #707EAE;
            --radius-lg: 20px;
            --radius-xl: 30px;
            --shadow-card: 0px 20px 40px rgba(112, 144, 176, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background decorations */
        body::before {
            content: '';
            position: absolute;
            top: -150px;
            right: -150px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(67, 24, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Main Content */
        .error-main {
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .error-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 2rem 4rem;
            text-align: center;
            max-width: 1000px;
            width: calc(100vw - 6rem);
            position: relative;
            overflow: hidden;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(67, 24, 255, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        .error-card::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        .error-content {
            position: relative;
            z-index: 1;
        }

        .error-illustration {
            margin-bottom: 0.75rem;
        }

        .error-illustration svg {
            width: 100%;
            max-width: 180px;
            height: auto;
        }

        .error-code {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .error-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .error-message {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.25rem;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-dashboard {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-xl);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(67, 24, 255, 0.3);
        }

        .btn-dashboard:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(67, 24, 255, 0.4);
            color: white;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
            color: var(--text-primary);
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-xl);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: 2px solid rgba(0, 0, 0, 0.08);
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-3px);
        }

        .quick-links {
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
        }

        .quick-links-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .quick-links-list {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            background: rgba(67, 24, 255, 0.06);
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .quick-link:hover {
            background: rgba(67, 24, 255, 0.12);
            transform: translateY(-2px);
        }

        .quick-link i {
            font-size: 0.85rem;
        }

        /* Floating shapes */
        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            opacity: 0.12;
        }

        .shape-1 {
            top: 15%;
            left: 10%;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 4px;
            transform: rotate(45deg);
            animation: pulse 3s ease-in-out infinite;
        }

        .shape-2 {
            top: 25%;
            right: 15%;
            width: 14px;
            height: 14px;
            background: #6366f1;
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite 0.5s;
        }

        .shape-3 {
            bottom: 30%;
            left: 12%;
            width: 16px;
            height: 16px;
            background: #8b5cf6;
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite 1s;
        }

        .shape-4 {
            bottom: 20%;
            right: 10%;
            width: 24px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 6px;
            transform: rotate(30deg);
            animation: pulse 3s ease-in-out infinite 1.5s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.12; transform: scale(1) rotate(var(--rotate, 0deg)); }
            50% { opacity: 0.2; transform: scale(1.1) rotate(var(--rotate, 0deg)); }
        }

        .shape-1 { --rotate: 45deg; }
        .shape-4 { --rotate: 30deg; }

        /* Responsive */
        @media (max-width: 768px) {
            .error-main {
                padding: 1.5rem;
            }

            .error-card {
                padding: 2rem 1.5rem;
                max-width: 100%;
            }

            .error-code {
                font-size: 3.5rem;
            }

            .error-title {
                font-size: 1.2rem;
            }

            .error-illustration svg {
                max-width: 180px;
            }

            .error-actions {
                flex-direction: column;
                align-items: center;
            }

            .btn-dashboard, .btn-back {
                width: 100%;
                max-width: 260px;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <!-- Floating Shapes -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <!-- Main Content -->
    <main class="error-main">
        <div class="error-card">
            <div class="error-content">
                <!-- Illustration -->
                <div class="error-illustration">
                    <svg viewBox="0 0 350 260" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Background shapes -->
                        <ellipse cx="175" cy="130" rx="130" ry="100" fill="url(#dashGrad1)" opacity="0.08"/>
                        <circle cx="280" cy="60" r="35" fill="url(#dashGrad2)" opacity="0.06"/>
                        <circle cx="50" cy="190" r="30" fill="url(#dashGrad2)" opacity="0.05"/>

                        <!-- Dashboard/Window frame -->
                        <rect x="70" y="50" width="210" height="150" rx="12" fill="#E2E8F0"/>
                        <rect x="70" y="50" width="210" height="28" rx="12" fill="#CBD5E0"/>
                        <rect x="70" y="66" width="210" height="12" fill="#CBD5E0"/>

                        <!-- Window controls -->
                        <circle cx="88" cy="64" r="5" fill="#FC8181"/>
                        <circle cx="104" cy="64" r="5" fill="#F6AD55"/>
                        <circle cx="120" cy="64" r="5" fill="#68D391"/>

                        <!-- Window content area -->
                        <rect x="80" y="88" width="190" height="102" rx="6" fill="white"/>

                        <!-- Content placeholders -->
                        <rect x="95" y="105" width="70" height="8" rx="4" fill="#E2E8F0"/>
                        <rect x="95" y="120" width="100" height="5" rx="2.5" fill="#F1F5F9"/>
                        <rect x="95" y="130" width="85" height="5" rx="2.5" fill="#F1F5F9"/>

                        <!-- Large question mark in content area -->
                        <g transform="translate(145, 145)">
                            <circle cx="30" cy="25" r="30" fill="url(#dashGrad1)" opacity="0.12"/>
                            <text x="30" y="38" text-anchor="middle" fill="url(#dashGrad1)" font-size="38" font-weight="bold" font-family="Plus Jakarta Sans, sans-serif">?</text>
                        </g>

                        <!-- Floating broken link icon -->
                        <g transform="translate(255, 115)">
                            <circle cx="20" cy="20" r="22" fill="white" stroke="#E2E8F0" stroke-width="2"/>
                            <path d="M14 20 L18 20 M22 20 L26 20" stroke="url(#dashGrad1)" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M16 16 L13 13 M24 24 L27 27" stroke="#FC8181" stroke-width="2" stroke-linecap="round"/>
                        </g>

                        <!-- Decorative elements -->
                        <g fill="var(--primary-color)" opacity="0.5">
                            <path d="M300 170 L302 175 L308 175 L304 179 L306 185 L300 181 L294 185 L296 179 L292 175 L298 175 Z"/>
                            <circle cx="45" cy="80" r="4"/>
                        </g>

                        <rect x="290" cy="100" width="12" height="12" rx="3" fill="url(#dashGrad2)" opacity="0.3" transform="rotate(15, 296, 106)"/>

                        <!-- Gradients -->
                        <defs>
                            <linearGradient id="dashGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#4318FF"/>
                                <stop offset="100%" style="stop-color:#7B5AFF"/>
                            </linearGradient>
                            <linearGradient id="dashGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1"/>
                                <stop offset="100%" style="stop-color:#8b5cf6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>

                <!-- Error Code -->
                <div class="error-code">404</div>

                <!-- Error Title -->
                <h1 class="error-title">Page Not Found</h1>

                <!-- Error Message -->
                <p class="error-message">
                    The page you're looking for doesn't exist or you don't have permission to access it.
                </p>

                <!-- Action Buttons -->
                <div class="error-actions">
                    <a href="/dashboard" class="btn-dashboard">
                        <i class="bi bi-grid-fill"></i> Go to Dashboard
                    </a>
                    <a href="javascript:history.back()" class="btn-back">
                        <i class="bi bi-arrow-left"></i> Go Back
                    </a>
                </div>

                <!-- Quick Links -->
                <div class="quick-links">
                    <p class="quick-links-title">Quick Links</p>
                    <div class="quick-links-list">
                        <a href="/create" class="quick-link">
                            <i class="bi bi-plus-square"></i> Create Blog
                        </a>
                        <a href="/drafts" class="quick-link">
                            <i class="bi bi-file-text"></i> Drafts
                        </a>
                        <a href="/categories" class="quick-link">
                            <i class="bi bi-tags"></i> Categories
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Subtle parallax effect on mouse move
        document.addEventListener('mousemove', function(e) {
            const card = document.querySelector('.error-card');
            const shapes = document.querySelectorAll('.shape');
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            card.style.transform = `perspective(1000px) rotateY(${x * 3}deg) rotateX(${-y * 3}deg)`;

            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 8;
                const xOffset = x * speed;
                const yOffset = y * speed;
                const baseRotate = shape.classList.contains('shape-1') ? 'rotate(45deg)' :
                                   shape.classList.contains('shape-4') ? 'rotate(30deg)' : '';
                shape.style.transform = `translate(${xOffset}px, ${yOffset}px) ${baseRotate}`;
            });
        });

        document.querySelector('.error-card').addEventListener('mouseleave', function() {
            this.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
        });
    </script>
</body>

</html>
