<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scriptly AI{% endblock %}</title>

    <!-- Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Dashboard CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    {% block extra_css %}{% endblock %}

    <style>
        /* Pulsing Scriptly Loader */
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4318FF, #ec4899);
            border-radius: 50%;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(67, 24, 255, 0);
            }

            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0);
            }
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Page transition animations */
        .page-transition {
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Smooth content fade */
        .dashboard-main {
            animation: contentFade 0.3s ease-out;
        }

        @keyframes contentFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Progress bar at top */
        #nav-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #4318FF, #ec4899);
            z-index: 10000;
            transition: width 0.2s ease;
            width: 0%;
        }

        #nav-progress.loading {
            animation: progressPulse 1.5s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 90%; }
        }

        /* Custom Toast Notifications */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .custom-toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            min-width: 320px;
            max-width: 420px;
            pointer-events: auto;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .custom-toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .custom-toast.hiding {
            transform: translateX(120%);
            opacity: 0;
        }

        .toast-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .toast-icon.success {
            background: rgba(5, 205, 153, 0.15);
            color: #05CD99;
        }

        .toast-icon.error {
            background: rgba(239, 68, 68, 0.15);
            color: #EF4444;
        }

        .toast-icon.warning {
            background: rgba(255, 181, 71, 0.15);
            color: #FFB547;
        }

        .toast-icon.info {
            background: rgba(67, 24, 255, 0.15);
            color: #4318FF;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1e293b;
            margin-bottom: 2px;
        }

        .toast-message {
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.4;
        }

        .toast-close {
            width: 28px;
            height: 28px;
            border: none;
            background: #f1f5f9;
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .toast-close:hover {
            background: #e2e8f0;
            color: #64748b;
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #4318FF, #05CD99);
            border-radius: 0 0 12px 12px;
            animation: toastProgress 4s linear forwards;
        }

        @keyframes toastProgress {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>

<body class="bg-body">
    <!-- Navigation Progress Bar -->
    <div id="nav-progress"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Loader -->
    <div id="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- App Wrapper -->
    <div class="app-wrapper">
        <main class="w-100 p-0">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap & Main JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    <!-- Global Loader Script -->
    <script>
        const pageLoader = document.getElementById("page-loader");
        const navProgress = document.getElementById("nav-progress");
        const toastContainer = document.getElementById("toast-container");

        // Toast notification system
        const showToast = (options) => {
            const { type = 'success', title, message, duration = 4000 } = options;

            const icons = {
                success: 'bi-check-circle-fill',
                error: 'bi-x-circle-fill',
                warning: 'bi-exclamation-triangle-fill',
                info: 'bi-info-circle-fill'
            };

            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerHTML = `
                <div class="toast-icon ${type}">
                    <i class="bi ${icons[type]}"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.closest('.custom-toast').remove()">
                    <i class="bi bi-x"></i>
                </button>
                <div class="toast-progress" style="animation-duration: ${duration}ms;"></div>
            `;

            toastContainer.appendChild(toast);

            // Trigger animation
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            // Auto remove
            setTimeout(() => {
                toast.classList.add('hiding');
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, duration);

            return toast;
        };

        // Expose globally
        window.showToast = showToast;

        const showLoader = () => {
            pageLoader.classList.remove("hidden");
            navProgress.classList.add("loading");
        };

        const hideLoader = () => {
            pageLoader.classList.add("hidden");
            navProgress.classList.remove("loading");
            navProgress.style.width = "100%";
            setTimeout(() => { navProgress.style.width = "0%"; }, 300);
        };

        // Expose globally
        window.showLoader = showLoader;
        window.hideLoader = hideLoader;

        // Hide on load
        window.addEventListener("load", () => setTimeout(hideLoader, 200));

        // Safety fallback: Force hide after 2.5 seconds if load event fails
        setTimeout(hideLoader, 2500);

        // Show on internal link click
        document.addEventListener("click", (e) => {
            const link = e.target.closest("a");
            if (link && link.href &&
                !link.href.includes("#") &&
                !link.href.startsWith("javascript:") &&
                !link.href.startsWith("mailto:") &&
                link.target !== "_blank" &&
                !e.ctrlKey && !e.metaKey &&
                !link.hasAttribute('data-bs-toggle') &&
                !link.hasAttribute('download') &&
                !link.classList.contains('logout') &&
                !link.classList.contains('no-loader')) {

                // Only show loader for internal navigation
                const currentHost = window.location.host;
                const linkHost = new URL(link.href).host;

                if (currentHost === linkHost) {
                    showLoader();
                }
            }
        });

        // Show on form submit (except AJAX forms)
        document.addEventListener("submit", (e) => {
            if (!e.target.classList.contains('no-loader') &&
                !e.target.classList.contains('ajax-form')) {
                showLoader();
            }
        });

        // Hide on back/forward navigation
        window.addEventListener("pageshow", (event) => {
            if (event.persisted) hideLoader();
        });

        // Handle active state in sidebar
        document.addEventListener("DOMContentLoaded", () => {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.sidebar-menu a, .nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
