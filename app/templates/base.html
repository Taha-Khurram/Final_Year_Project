<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scriptly AI{% endblock %}</title>

    <!-- Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Dashboard CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    {% block extra_css %}{% endblock %}

    <style>
        /* Pulsing Scriptly Loader */
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4318FF, #ec4899);
            border-radius: 50%;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(67, 24, 255, 0);
            }

            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0);
            }
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-body">
    <!-- Loader -->
    <div id="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- App Wrapper -->
    <div class="app-wrapper">
        <main class="w-100 p-0">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap & Main JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    <!-- Global Loader Script -->
    <script>
        const pageLoader = document.getElementById("page-loader");
        const showLoader = () => pageLoader.classList.remove("hidden");
        const hideLoader = () => pageLoader.classList.add("hidden");

        // Expose globally
        window.showLoader = showLoader;
        window.hideLoader = hideLoader;

        // Hide on load
        window.addEventListener("load", () => setTimeout(hideLoader, 300));

        // Safety fallback: Force hide after 3 seconds if load event fails
        setTimeout(hideLoader, 3000);

        // Show on link click
        document.addEventListener("click", (e) => {
            const link = e.target.closest("a");
            if (link && link.href &&
                !link.href.includes("#") &&
                !link.href.startsWith("javascript:") &&
                link.target !== "_blank" &&
                !e.ctrlKey && !e.metaKey && !link.hasAttribute('data-bs-toggle') &&
                !link.hasAttribute('download')) {
                showLoader();
            }
        });

        // Show on form submit
        document.addEventListener("submit", (e) => {
            if (!e.target.classList.contains('no-loader')) showLoader();
        });

        // Hide on back/forward
        window.addEventListener("pageshow", (event) => {
            if (event.persisted) hideLoader();
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
