<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scriptly AI{% endblock %}</title>

    <!-- Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Dashboard CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    {% block extra_css %}{% endblock %}

    <style>
        /* Pulsing Scriptly Loader */
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4318FF, #ec4899);
            border-radius: 50%;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(67, 24, 255, 0);
            }

            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(67, 24, 255, 0);
            }
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Page transition animations */
        .page-transition {
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Smooth content fade */
        .dashboard-main {
            animation: contentFade 0.3s ease-out;
        }

        @keyframes contentFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Progress bar at top */
        #nav-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #4318FF, #ec4899);
            z-index: 10000;
            transition: width 0.2s ease;
            width: 0%;
        }

        #nav-progress.loading {
            animation: progressPulse 1.5s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 90%; }
        }
    </style>
</head>

<body class="bg-body">
    <!-- Navigation Progress Bar -->
    <div id="nav-progress"></div>

    <!-- Loader -->
    <div id="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- App Wrapper -->
    <div class="app-wrapper">
        <main class="w-100 p-0">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap & Main JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    <!-- Global Loader Script -->
    <script>
        const pageLoader = document.getElementById("page-loader");
        const navProgress = document.getElementById("nav-progress");

        const showLoader = () => {
            pageLoader.classList.remove("hidden");
            navProgress.classList.add("loading");
        };

        const hideLoader = () => {
            pageLoader.classList.add("hidden");
            navProgress.classList.remove("loading");
            navProgress.style.width = "100%";
            setTimeout(() => { navProgress.style.width = "0%"; }, 300);
        };

        // Expose globally
        window.showLoader = showLoader;
        window.hideLoader = hideLoader;

        // Hide on load
        window.addEventListener("load", () => setTimeout(hideLoader, 200));

        // Safety fallback: Force hide after 2.5 seconds if load event fails
        setTimeout(hideLoader, 2500);

        // Show on internal link click
        document.addEventListener("click", (e) => {
            const link = e.target.closest("a");
            if (link && link.href &&
                !link.href.includes("#") &&
                !link.href.startsWith("javascript:") &&
                !link.href.startsWith("mailto:") &&
                link.target !== "_blank" &&
                !e.ctrlKey && !e.metaKey &&
                !link.hasAttribute('data-bs-toggle') &&
                !link.hasAttribute('download') &&
                !link.classList.contains('logout') &&
                !link.classList.contains('no-loader')) {

                // Only show loader for internal navigation
                const currentHost = window.location.host;
                const linkHost = new URL(link.href).host;

                if (currentHost === linkHost) {
                    showLoader();
                }
            }
        });

        // Show on form submit (except AJAX forms)
        document.addEventListener("submit", (e) => {
            if (!e.target.classList.contains('no-loader') &&
                !e.target.classList.contains('ajax-form')) {
                showLoader();
            }
        });

        // Hide on back/forward navigation
        window.addEventListener("pageshow", (event) => {
            if (event.persisted) hideLoader();
        });

        // Handle active state in sidebar
        document.addEventListener("DOMContentLoaded", () => {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.sidebar-menu a, .nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
